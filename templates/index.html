<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyBot — AI Study Assistant</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#6c63ff"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="StudyBot"/>
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png"/>
  <link rel="icon" href="/static/icons/icon-192.png"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #fff; display: flex; height: 100vh; height: 100dvh; overflow: hidden; }

    /* Sidebar */
    #sidebar {
      width: 260px; min-width: 260px; background: #13131f; border-right: 1px solid #1e1e30;
      display: flex; flex-direction: column; padding: 16px; gap: 8px; overflow-y: auto;
      transition: transform 0.3s ease;
    }
    #sidebar h2 { font-size: 18px; font-weight: 800; color: #a78bfa; padding: 8px 4px; }
    #newChatBtn {
      padding: 10px 14px; background: #6c63ff; border: none; border-radius: 10px;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; text-align: left;
    }
    #newChatBtn:hover { background: #5a52e0; }
    .chat-item {
      padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 13px;
      color: #aaa; display: flex; justify-content: space-between; align-items: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-item:hover, .chat-item.active { background: #1e1e30; color: #fff; }
    .chat-item .del-btn { font-size: 12px; color: #555; cursor: pointer; padding: 2px 6px; border-radius: 6px; }
    .chat-item .del-btn:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }
    .sidebar-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid #1e1e30; }
    #logoutBtn {
      width: 100%; padding: 10px; background: none; border: 1px solid #2a2a3e;
      border-radius: 10px; color: #888; font-size: 13px; cursor: pointer;
    }
    #logoutBtn:hover { border-color: #ff6b6b; color: #ff6b6b; }
    #usernameDisplay { font-size: 12px; color: #555; padding: 6px 4px; }

    /* Main */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    #chatHeader {
      padding: 16px 24px; border-bottom: 1px solid #1e1e30;
      display: flex; align-items: center; gap: 12px; background: #13131f;
    }
    #chatTitle { font-size: 16px; font-weight: 600; color: #fff; flex: 1; }
    #hamburger { display: block; background: none; border: none; color: #aaa; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
    #hamburger:hover { background: #1e1e30; color: #fff; }

    #messages {
      flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 4px; }

    .msg { max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
    .msg.user { background: #6c63ff; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.bot { background: #1e1e30; color: #ddd; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.bot .speak-btn {
      display: inline-block; margin-top: 6px; background: none; border: 1px solid #2a2a3e;
      border-radius: 20px; color: #888; font-size: 11px; padding: 3px 10px; cursor: pointer;
    }
    .msg.bot .speak-btn:hover { border-color: #6c63ff; color: #a78bfa; }
    .msg.bot .speak-btn.speaking { border-color: #a78bfa; color: #a78bfa; }
    .msg img { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; }
    .msg .sources { margin-top: 8px; font-size: 12px; color: #888; }
    .msg .sources a { color: #a78bfa; text-decoration: none; }

    .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
    .typing span { width: 8px; height: 8px; background: #6c63ff; border-radius: 50%; animation: bounce 1s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    #inputArea {
      padding: 12px 16px; border-top: 1px solid #1e1e30; background: #13131f;
      display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
    }
    /* Plus menu */
    #plusWrap { position: relative; }
    #plusBtn {
      width: 40px; height: 40px; background: #1e1e30; border: 1px solid #2a2a3e;
      border-radius: 12px; color: #aaa; font-size: 22px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #plusBtn:hover { border-color: #6c63ff; color: #a78bfa; }
    #plusMenu {
      display: none; position: absolute; bottom: 52px; left: 0;
      background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 14px;
      padding: 8px; min-width: 190px; z-index: 50; flex-direction: column; gap: 2px;
    }
    #plusMenu.open { display: flex; }
    .pmenu-item {
      padding: 9px 14px; border-radius: 10px; font-size: 13px; color: #ccc;
      cursor: pointer; display: flex; align-items: center; gap: 10px; background: none; border: none; text-align: left;
    }
    .pmenu-item:hover { background: #1e1e30; color: #fff; }
    #inputRow { display: flex; gap: 8px; align-items: flex-end; min-width: 0; }
    #userInput {
      flex: 1; min-width: 0; padding: 12px 16px; background: #1e1e30; border: 1px solid #2a2a3e;
      border-radius: 14px; color: #fff; font-size: 14px; outline: none; resize: none;
      max-height: 120px; font-family: inherit;
    }
    #userInput:focus { border-color: #6c63ff; }
    #sendBtn {
      padding: 12px 20px; background: #6c63ff; border: none; border-radius: 14px;
      color: #fff; font-size: 18px; cursor: pointer;
    }
    #sendBtn:hover { background: #5a52e0; }
    #voiceBtn {
      padding: 12px 14px; background: #1e1e30; border: 1px solid #2a2a3e;
      border-radius: 14px; color: #aaa; font-size: 18px; cursor: pointer;
    }
    #voiceBtn:hover { border-color: #6c63ff; color: #a78bfa; }
    #voiceBtn.listening { border-color: #ff6b6b; color: #ff6b6b; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    #emptyState {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; color: #444;
    }
    #emptyState .icon { font-size: 48px; }
    #emptyState p { font-size: 15px; }

    /* Modals */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e; border-radius: 16px; padding: 28px; width: 340px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal h3 { font-size: 18px; font-weight: 700; }
    .modal input, .modal textarea {
      padding: 10px 14px; background: #0f0f1a; border: 1px solid #2a2a3e;
      border-radius: 10px; color: #fff; font-size: 14px; outline: none; width: 100%;
    }
    .modal input:focus, .modal textarea:focus { border-color: #6c63ff; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-cancel { background: #1e1e30; color: #aaa; }

    /* Explore Modal */
    .explore-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-height: 360px; overflow-y: auto; }
    .explore-card {
      background: #0f0f1a; border: 1px solid #2a2a3e; border-radius: 14px;
      padding: 16px 12px; text-align: center; cursor: pointer; transition: border-color 0.2s;
    }
    .explore-card:hover { border-color: #6c63ff; }
    .explore-card .ec-icon { font-size: 28px; margin-bottom: 6px; }
    .explore-card .ec-label { font-size: 12px; color: #aaa; }

    /* Camera Modal */
    #cameraPreview { width: 100%; border-radius: 10px; background: #000; max-height: 240px; }
    #captureCanvas { display: none; }

    @media (max-width: 700px) {
      #sidebar {
        position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
        width: 260px; min-width: 260px; padding: 16px;
        transform: translateX(-100%);
      }
      #sidebar.open { transform: translateX(0); }
      #sidebarOverlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 49;
      }
      #sidebarOverlay.open { display: block; }
      .msg { max-width: 88%; font-size: 13px; }
      #chatHeader { padding: 10px 14px; }
      #inputArea { padding: 8px 10px; }
      #userInput { font-size: 13px; padding: 10px 12px; }
      #sendBtn { padding: 10px 12px; font-size: 16px; flex-shrink: 0; }
      #voiceBtn { padding: 10px 10px; font-size: 16px; flex-shrink: 0; }
      #plusBtn { width: 36px; height: 36px; font-size: 20px; flex-shrink: 0; }
      #messages { padding: 12px; gap: 12px; }
      .modal { width: calc(100vw - 24px) !important; padding: 18px; }
      .explore-grid { gap: 8px; }
      .explore-card { padding: 10px 6px; }
      .explore-card .ec-icon { font-size: 22px; }
      #plusMenu { min-width: 170px; }
    }
  </style>
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
  <h2>🎓 StudyBot</h2>
  <div id="usernameDisplay"></div>
  <button id="newChatBtn" onclick="newChat()">＋ New Chat</button>
  <div id="chatList"></div>
  <div class="sidebar-footer">
    <button id="logoutBtn" onclick="logout()">🚪 Logout</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="chatHeader">
    <button id="hamburger" onclick="toggleSidebar()">☰</button>
    <span id="chatTitle">Select or start a chat</span>
  </div>

  <div id="messages">
    <div id="emptyState">
      <div class="icon">🎓</div>
      <p>Start a new chat to begin studying!</p>
    </div>
  </div>

  <div id="inputArea">
    <div id="inputRow">
      <div id="plusWrap">
        <button id="plusBtn" onclick="togglePlusMenu()" title="More options">＋</button>
        <div id="plusMenu">
          <button class="pmenu-item" onclick="closePlus();openWebSearch()">🌐 Web Search</button>
          <button class="pmenu-item" onclick="closePlus();openQuiz()">📝 Quiz Me</button>
          <button class="pmenu-item" onclick="closePlus();openGenerateImage()">🎨 Generate Image</button>
          <button class="pmenu-item" onclick="closePlus();document.getElementById('fileInput').click()">📄 Upload File</button>
          <button class="pmenu-item" onclick="closePlus();document.getElementById('photoInput').click()">🖼️ Photos</button>
          <button class="pmenu-item" onclick="closePlus();openCamera()">📷 Camera</button>
          <button class="pmenu-item" onclick="closePlus();document.getElementById('videoInput').click()">🎬 Upload Video</button>
          <button class="pmenu-item" onclick="closePlus();openExplore()">🧩 Explore Apps</button>
        </div>
      </div>
      <textarea id="userInput" rows="1" placeholder="Ask anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="voiceBtn" onclick="toggleVoice()" title="Voice input">🎤</button>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="fileInput" accept=".pdf,.txt,.csv,.zip" style="display:none" onchange="uploadFile(this)"/>
<input type="file" id="imageInput" accept="image/*" style="display:none" onchange="analyzeImage(this)"/>
<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="analyzeImage(this)"/>
<input type="file" id="videoInput" accept="video/*" style="display:none" onchange="uploadVideo(this)"/>

<!-- Generate Image Modal -->
<div class="modal-overlay" id="generateImageModal">
  <div class="modal">
    <h3>🎨 Generate Image</h3>
    <input type="text" id="imagePromptInput" placeholder="Describe the image you want..."/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('generateImageModal')">Cancel</button>
      <button class="btn-primary" onclick="doGenerateImage()">Generate</button>
    </div>
  </div>
</div>

<!-- Web Search Modal -->
<div class="modal-overlay" id="webSearchModal">
  <div class="modal">
    <h3>🌐 Web Search</h3>
    <input type="text" id="searchQuery" placeholder="Enter search query..."/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('webSearchModal')">Cancel</button>
      <button class="btn-primary" onclick="doWebSearch()">Search</button>
    </div>
  </div>
</div>

<!-- Camera Modal -->
<div class="modal-overlay" id="cameraModal">
  <div class="modal" style="width:400px">
    <h3>📷 Camera</h3>
    <video id="cameraPreview" autoplay playsinline></video>
    <canvas id="captureCanvas"></canvas>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeCamera()">Cancel</button>
      <button class="btn-primary" onclick="capturePhoto()">📸 Capture & Analyze</button>
    </div>
  </div>
</div>

<!-- Explore Apps Modal -->
<div class="modal-overlay" id="exploreModal">
  <div class="modal" style="width:380px">
    <h3>🧩 Explore Apps</h3>
    <div class="explore-grid">
      <div class="explore-card" onclick="window.open('https://www.w3schools.com','_blank')">
        <div class="ec-icon">🟢</div><div class="ec-label">W3Schools</div>
      </div>
      <div class="explore-card" onclick="window.open('https://www.khanacademy.org','_blank')">
        <div class="ec-icon">🎓</div><div class="ec-label">Khan Academy</div>
      </div>
      <div class="explore-card" onclick="window.open('https://www.youtube.com','_blank')">
        <div class="ec-icon">▶️</div><div class="ec-label">YouTube</div>
      </div>
      <div class="explore-card" onclick="window.open('https://www.linkedin.com/learning','_blank')">
        <div class="ec-icon">💼</div><div class="ec-label">LinkedIn Learning</div>
      </div>
      <div class="explore-card" onclick="window.open('https://www.coursera.org','_blank')">
        <div class="ec-icon">📚</div><div class="ec-label">Coursera</div>
      </div>
      <div class="explore-card" onclick="window.open('https://www.udemy.com','_blank')">
        <div class="ec-icon">🎯</div><div class="ec-label">Udemy</div>
      </div>
      <div class="explore-card" onclick="window.open('https://github.com','_blank')">
        <div class="ec-icon">🐙</div><div class="ec-label">GitHub</div>
      </div>
      <div class="explore-card" onclick="window.open('https://stackoverflow.com','_blank')">
        <div class="ec-icon">💬</div><div class="ec-label">Stack Overflow</div>
      </div>
      <div class="explore-card" onclick="window.open('https://www.geeksforgeeks.org','_blank')">
        <div class="ec-icon">🧠</div><div class="ec-label">GeeksforGeeks</div>
      </div>
      <div class="explore-card" onclick="window.open('https://leetcode.com','_blank')">
        <div class="ec-icon">⚡</div><div class="ec-label">LeetCode</div>
      </div>
    </div>
    <button class="btn-cancel" style="width:100%;margin-top:4px" onclick="closeModal('exploreModal')">Close</button>
  </div>
</div>

<!-- Quiz Modal -->
<div class="modal-overlay" id="quizModal">
  <div class="modal">
    <h3>📝 Quiz Mode</h3>
    <input type="text" id="quizTopic" placeholder="Enter topic (e.g. Photosynthesis)"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('quizModal')">Cancel</button>
      <button class="btn-primary" onclick="startQuiz()">Start Quiz</button>
    </div>
  </div>
</div>

<script>
  // ── Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  }

  let currentChatId = null;

  // ── Init
  window.onload = async () => {
    const res = await fetch('/me');
    const data = await res.json();
    if (!data.logged_in) { window.location.href = '/login'; return; }
    document.getElementById('usernameDisplay').innerText = '👤 ' + data.username;
    loadChatList();
  };

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  }

  // ── Chat list
  async function loadChatList() {
    const res = await fetch('/get-chats');
    const data = await res.json();
    const list = document.getElementById('chatList');
    list.innerHTML = '';
    data.chats.forEach(c => {
      const div = document.createElement('div');
      div.className = 'chat-item' + (c.id === currentChatId ? ' active' : '');
      div.innerHTML = `<span onclick="loadChat('${c.id}')" style="flex:1;overflow:hidden;text-overflow:ellipsis">${c.title}</span>
        <span class="del-btn" onclick="deleteChat('${c.id}')">✕</span>`;
      list.appendChild(div);
    });
  }

  async function newChat() {
    const res = await fetch('/new-chat', { method: 'POST' });
    const data = await res.json();
    currentChatId = data.chat_id;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('chatTitle').innerText = 'New Chat';
    loadChatList();
  }

  async function loadChat(chatId) {
    currentChatId = chatId;
    const res = await fetch('/load-chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId })
    });
    const data = await res.json();
    document.getElementById('chatTitle').innerText = data.title;
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    data.messages.forEach(m => {
      if (m.content.startsWith('[Generated Image]')) return;
      if (m.content === 'Asked user for image details') return;
      appendMessage(m.role === 'user' ? 'user' : 'bot', m.content);
    });
    loadChatList();
  }

  async function deleteChat(chatId) {
    await fetch('/delete-chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: chatId })
    });
    if (currentChatId === chatId) {
      currentChatId = null;
      document.getElementById('messages').innerHTML = `<div id="emptyState"><div class="icon">🎓</div><p>Start a new chat to begin studying!</p></div>`;
      document.getElementById('chatTitle').innerText = 'Select or start a chat';
    }
    loadChatList();
  }

  // ── Messaging
  function appendMessage(role, content, extra) {
    const emptyState = document.getElementById('emptyState');
    if (emptyState) emptyState.remove();

    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;

    if (extra && extra.image) {
      div.innerHTML = `${content}<br><img src="${extra.image}" alt="Generated image"/>`;
    } else if (extra && extra.sources) {
      let srcHtml = '<div class="sources">Sources: ';
      extra.sources.forEach((s, i) => { srcHtml += `<a href="${s.link}" target="_blank">[${i+1}]</a> `; });
      srcHtml += '</div>';
      div.innerHTML = content + srcHtml;
    } else {
      div.innerText = content;
    }

    if (role === 'bot') {
      const btn = document.createElement('button');
      btn.className = 'speak-btn';
      btn.innerText = '🔊 Speak';
      btn.onclick = () => speakText(content, btn);
      div.appendChild(btn);
    }

    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  // ── Text-to-speech
  let currentUtterance = null;
  function speakText(text, btn) {
    if (currentUtterance) { speechSynthesis.cancel(); currentUtterance = null; btn.innerText = '🔊 Speak'; btn.classList.remove('speaking'); return; }
    const utter = new SpeechSynthesisUtterance(text);
    utter.onstart = () => { btn.innerText = '⏹ Stop'; btn.classList.add('speaking'); };
    utter.onend = () => { btn.innerText = '🔊 Speak'; btn.classList.remove('speaking'); currentUtterance = null; };
    currentUtterance = utter;
    speechSynthesis.speak(utter);
  }

  // ── Voice input
  let recognition = null;
  function toggleVoice() {
    const btn = document.getElementById('voiceBtn');
    if (recognition) { recognition.stop(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition not supported in this browser.'); return; }
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.onstart = () => { btn.classList.add('listening'); btn.title = 'Listening... click to stop'; };
    recognition.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; autoResize(document.getElementById('userInput')); };
    recognition.onend = () => { btn.classList.remove('listening'); btn.title = 'Voice input'; recognition = null; };
    recognition.onerror = () => { btn.classList.remove('listening'); recognition = null; };
    recognition.start();
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingIndicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    if (!currentChatId) { await newChat(); }
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    input.style.height = 'auto';
    appendMessage('user', msg);
    showTyping();

    const res = await fetch('/chat', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, chat_id: currentChatId })
    });
    const data = await res.json();
    removeTyping();

    if (data.image_data) {
      appendMessage('bot', data.reply, { image: data.image_data });
    } else {
      appendMessage('bot', data.reply);
    }
    loadChatList();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // ── File upload
  async function uploadFile(input) {
    if (!currentChatId) await newChat();
    const file = input.files[0];
    if (!file) return;
    appendMessage('user', `📄 Uploaded: ${file.name}`);
    showTyping();
    const form = new FormData();
    form.append('file', file);
    form.append('chat_id', currentChatId);
    form.append('message', 'Please analyze this file.');
    const res = await fetch('/upload-file', { method: 'POST', body: form });
    const data = await res.json();
    removeTyping();
    appendMessage('bot', data.reply);
    input.value = '';
    loadChatList();
  }

  // ── Image analysis
  async function analyzeImage(input) {
    if (!currentChatId) await newChat();
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (e) => {
      appendMessage('user', '🖼️ Analyzing image...');
      showTyping();
      const res = await fetch('/analyze-image', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: e.target.result, message: 'What do you see in this image?', chat_id: currentChatId })
      });
      const data = await res.json();
      removeTyping();
      appendMessage('bot', data.reply);
      loadChatList();
    };
    reader.readAsDataURL(file);
    input.value = '';
  }

  // ── Video upload — show transcript too
  async function uploadVideo(input) {
    if (!currentChatId) await newChat();
    const file = input.files[0];
    if (!file) return;
    appendMessage('user', `🎬 Uploaded video: ${file.name}`);
    showTyping();
    const form = new FormData();
    form.append('video', file);
    form.append('chat_id', currentChatId);
    form.append('message', 'Analyze this video and explain what you see.');
    const res = await fetch('/analyze-video', { method: 'POST', body: form });
    const data = await res.json();
    removeTyping();
    if (data.transcript && data.transcript !== 'No speech detected') {
      appendMessage('bot', `📝 Transcript: ${data.transcript}`);
    }
    appendMessage('bot', data.reply);
    input.value = '';
    loadChatList();
  }

  // ── Web search
  function openWebSearch() { document.getElementById('webSearchModal').classList.add('open'); }
  async function doWebSearch() {
    const query = document.getElementById('searchQuery').value.trim();
    if (!query) return;
    closeModal('webSearchModal');
    if (!currentChatId) await newChat();
    appendMessage('user', '🌐 ' + query);
    showTyping();
    const res = await fetch('/web-search', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, chat_id: currentChatId })
    });
    const data = await res.json();
    removeTyping();
    appendMessage('bot', data.reply, { sources: data.sources });
    document.getElementById('searchQuery').value = '';
    loadChatList();
  }

  // ── Quiz
  function openQuiz() { document.getElementById('quizModal').classList.add('open'); }
  async function startQuiz() {
    const topic = document.getElementById('quizTopic').value.trim();
    if (!topic) return;
    closeModal('quizModal');
    if (!currentChatId) await newChat();
    appendMessage('user', `📝 Quiz me on: ${topic}`);
    showTyping();
    const res = await fetch('/quiz', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, chat_id: currentChatId })
    });
    const data = await res.json();
    removeTyping();
    appendMessage('bot', data.reply);
    document.getElementById('quizTopic').value = '';
    loadChatList();
  }

  // ── Plus menu
  function togglePlusMenu() { document.getElementById('plusMenu').classList.toggle('open'); }
  function closePlus() { document.getElementById('plusMenu').classList.remove('open'); }
  document.addEventListener('click', (e) => {
    if (!document.getElementById('plusWrap').contains(e.target)) closePlus();
  });

  // ── Generate Image modal
  function openGenerateImage() { document.getElementById('generateImageModal').classList.add('open'); }
  async function doGenerateImage() {
    const prompt = document.getElementById('imagePromptInput').value.trim();
    if (!prompt) return;
    closeModal('generateImageModal');
    if (!currentChatId) await newChat();
    appendMessage('user', `🎨 Generate image: ${prompt}`);
    showTyping();
    const res = await fetch('/generate-image', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, chat_id: currentChatId })
    });
    const data = await res.json();
    removeTyping();
    if (data.image_data) {
      appendMessage('bot', 'Here is your generated image!', { image: data.image_data });
    } else {
      appendMessage('bot', data.error || 'Image generation failed.');
    }
    document.getElementById('imagePromptInput').value = '';
    loadChatList();
  }

  // ── Explore
  function openExplore() { document.getElementById('exploreModal').classList.add('open'); }

  // ── Camera
  let cameraStream = null;
  async function openCamera() {
    document.getElementById('cameraModal').classList.add('open');
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });
      document.getElementById('cameraPreview').srcObject = cameraStream;
    } catch(e) { alert('Camera access denied or not available.'); closeCamera(); }
  }
  function closeCamera() {
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    document.getElementById('cameraModal').classList.remove('open');
  }
  async function capturePhoto() {
    const video = document.getElementById('cameraPreview');
    const canvas = document.getElementById('captureCanvas');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg');
    closeCamera();
    if (!currentChatId) await newChat();
    appendMessage('user', '📷 Captured photo from camera');
    showTyping();
    const res = await fetch('/analyze-image', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataUrl, message: 'What do you see in this image?', chat_id: currentChatId })
    });
    const data = await res.json();
    removeTyping();
    appendMessage('bot', data.reply);
    loadChatList();
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  // ── Logout
  async function logout() {
    await fetch('/logout', { method: 'POST' });
    window.location.href = '/login';
  }
</script>
</body>
</html>
